project_name: "Super Apps MATSANDATAMA"
project_type: "Full-stack Web Application"
description: "Educational Management System for MTsN 2 Kota Malang - comprehensive school administration platform with QR-based attendance, student management, grading, and scheduling."

tech_stack:
  frontend:
    framework: "React 19.0.0"
    build_tool: "Craco (Create React App Configuration Override)"
    router: "React Router DOM 7.5.1"
    ui_library: "Radix UI + Tailwind CSS 3.4.17"
    state_management: "React Context (AuthContext, AcademicYearContext)"
    form_handling: "React Hook Form 7.56.2 + Zod validation"
    http_client: "Axios 1.8.4"
    key_libraries:
      - "Framer Motion 12.38.0 (animations)"
      - "Recharts 3.6.0 (charts)"
      - "html5-qrcode 2.3.8 (QR scanning)"
      - "XLSX 0.18.5 (Excel import/export)"
      - "Sonner 2.0.3 (toast notifications)"
      - "Lucide React (icons)"

  backend:
    framework: "FastAPI 0.110.1"
    server: "Uvicorn 0.25.0"
    database: "MongoDB"
    db_driver: "Motor 3.3.1 (async)"
    validation: "Pydantic 2.6.4+"
    authentication:
      - "PyJWT 2.10.1 (JWT tokens)"
      - "Bcrypt 4.1.3 (password hashing)"
      - "Python-Jose 3.3.0 (crypto)"
    key_libraries:
      - "Pandas 2.2.0 (data processing)"
      - "QRCode 8.2 (QR generation)"
      - "Pillow 10.0.0+ (image processing)"
      - "Pyotp 2.9.0 (TOTP/OTP)"
      - "Boto3 (AWS S3 integration)"

  infrastructure:
    containerization: "Docker"
    ci_cd: "GitHub Actions"
    version_control: "Git"

entry_points:
  frontend:
    main: "frontend/src/index.js"
    app: "frontend/src/App.js"
    start_command: "npm start (runs craco start)"
    default_port: 3000

  backend:
    main: "backend/server.py"
    start_command: "uvicorn server:app --reload --port 8000"
    default_port: 8000
    api_prefix: "/api"
    docs_url: "http://localhost:8000/docs"

project_structure:
  frontend_pages: 50+
  backend_routers: 31
  database_collections: 15+
  api_endpoints: 150+
  user_roles: 32

core_features:
  - name: "Authentication & Authorization"
    description: "JWT-based auth with RBAC, multi-role support, admin impersonation, password policies, session management, math CAPTCHA"
    key_endpoints:
      - "POST /api/auth/login"
      - "POST /api/auth/logout"
      - "POST /api/auth/switch-role"
      - "POST /api/auth/impersonate"
      - "GET /api/auth/me"

  - name: "Journal/Attendance System (Jurnal Presisi)"
    description: "Encrypted QR-based teacher attendance with real-time validation (schedule, GPS geofence, grace period)"
    key_endpoints:
      - "POST /api/journals/validate-qr"
      - "POST /api/journals/create"
      - "GET /api/journals/my"
      - "GET /api/journals/stats"
    features:
      - "Static & dynamic QR codes (TOTP-based)"
      - "Fernet/AES encryption"
      - "Multi-layer validation (schedule, GPS, grace period)"
      - "Journal locking by time window"

  - name: "Student Management"
    description: "Comprehensive student data with EMIS compliance (150+ fields), mutations, graduation tracking"
    key_endpoints:
      - "GET /api/students"
      - "POST /api/students"
      - "PUT /api/students/{id}"
      - "POST /api/students/bulk-import"
      - "GET /api/students/export"
    emis_fields:
      - "Basic info (NISN, NIS, NISM, NPU)"
      - "Demographics (gender, birth, address, photo)"
      - "Family data (father, mother, guardian with extensive details)"
      - "Support programs (KIP, KK, PKH)"
      - "Education history"
      - "Documents archiving"

  - name: "Schedule Management"
    description: "Teacher-to-room assignments, teaching slots (9 slots + breaks), multi-day weekly view"
    key_endpoints:
      - "GET /api/schedules"
      - "POST /api/schedules"
      - "POST /api/schedules/bulk-import"
      - "GET /api/schedules/grid"
      - "POST /api/schedules/validate-qr"

  - name: "Class Management"
    description: "Class organization, homeroom teacher assignment, student roster, bulk attendance"
    key_endpoints:
      - "GET /api/classes"
      - "POST /api/classes"
      - "GET /api/classes/{id}/students"
      - "POST /api/classes/bulk-attendance"

  - name: "Hierarchical Time Management"
    description: "3-level hierarchy: Calendar Year → Academic Year → Semester with context switching"
    key_endpoints:
      - "GET /api/tahun-takwim"
      - "GET /api/academic/info"
      - "GET /api/semesters"

  - name: "Grading & Report Cards"
    description: "Grade input, report card generation, GPA calculation, PDF export"
    key_endpoints:
      - "POST /api/grades/input"
      - "GET /api/grades/my-classes"
      - "GET /api/grades/student/{id}"

  - name: "Discipline/Conduct Management (Tata Tertib)"
    description: "Discipline categories, infraction recording, handling tracking, parent notification"
    key_endpoints:
      - "POST /api/tatib/kategori"
      - "GET /api/tatib/student/{id}"
      - "POST /api/tatib/penanganan"

  - name: "Data Verification (Verval)"
    description: "Student/teacher data verification workflow with approval/rejection"
    key_endpoints:
      - "POST /api/verval/request"
      - "GET /api/verval/pending"
      - "PUT /api/verval/{id}/approve"

  - name: "Admin Features"
    description: "Settings management, user management, audit/security logging, backup/restore, statistics"
    key_endpoints:
      - "GET /api/admin/stats"
      - "GET /api/admin/audit-logs"
      - "POST /api/admin/backup"
      - "GET /api/settings"
      - "PUT /api/settings"

user_roles:
  - "admin (System Administrator)"
  - "siswa (Student)"
  - "guru (Subject Teacher)"
  - "wali_kelas (Homeroom Teacher)"
  - "kepala_sekolah (Principal)"
  - "guru_piket (Duty Teacher)"
  - "guru_bk (School Counselor)"
  - "guru_tata_tertib (Discipline Teacher)"
  - "guru_ekstrakurikuler (Extracurricular Coordinator)"
  - "tenaga_kependidikan (Administrative Staff)"
  - "alumni (Graduate)"
  - "... 21 more specialized roles"

database_models:
  - name: "users"
    description: "User accounts with roles, EMIS data (if student), session management"
    key_fields:
      - "id, username, password_hash, full_name, email, phone"
      - "roles (array), active_role"
      - "nisn, nis, nism (student IDs)"
      - "150+ EMIS fields for students"
      - "homeroom_class_id, jabatan_ids, parent_of"
      - "graduation_status, mutation_type"
      - "view_academic_year_id, view_semester (context override)"

  - name: "academic_years"
    description: "Academic year periods (e.g., 2025/2026)"
    key_fields: "id, name, tahun_takwim_id, start_date, end_date, is_active"

  - name: "tahun_takwim"
    description: "Calendar years (Jan-Dec)"
    key_fields: "id, year, start_date, end_date, is_active"

  - name: "semesters"
    description: "Evaluation periods (Ganjil/Genap)"
    key_fields: "id, name, code, academic_year_id, start_date, end_date, semester_type"

  - name: "classes"
    description: "Class organization (7A, 8B, etc.)"
    key_fields: "id, name, code, grade, homeroom_teacher_id, semester_id, capacity"

  - name: "rooms"
    description: "Classrooms with GPS coordinates for geofencing"
    key_fields: "id, name, code, gps_lat, gps_lon, gps_radius_meters, gps_enabled, qr_secret"

  - name: "subjects"
    description: "School subjects"
    key_fields: "id, name, code, curriculum_id"

  - name: "schedules"
    description: "Teacher teaching assignments"
    key_fields: "id, semester_id, teacher_id, room_id, subject_id, day, slot_index, start_time, end_time"

  - name: "journals"
    description: "Teacher attendance records with validation details"
    key_fields: "id, teacher_id, room_id, subject_id, started_at, ended_at, validation (nested), status, notes"

  - name: "grades"
    description: "Student grades by subject/semester"
    key_fields: "id, student_id, subject_id, semester_id, nilai_harian, nilai_uts, nilai_uas, nilai_akhir"

  - name: "attendance_records"
    description: "Student daily attendance"
    key_fields: "id, student_id, date, status (hadir/sakit/izin/alfa), note, submitted_by"

  - name: "audit_logs"
    description: "Audit trail of all user actions"
    key_fields: "id, user_id, action, entity, entity_id, details, ip_address, timestamp"

  - name: "security_logs"
    description: "Security events (login, impersonation, etc.)"
    key_fields: "id, event_type, username, ip_address, details, timestamp"

  - name: "settings"
    description: "School configuration and system settings"
    key_fields: "school_name, logo_url, session_max_hours, idle_timeout_minutes, grace_minutes, gps settings, smtp settings"

security_features:
  - "JWT token authentication (12-hour expiration)"
  - "Bcrypt password hashing (cost factor 4)"
  - "Math CAPTCHA anti-brute force"
  - "Account lockout after 5 failed attempts"
  - "Password policy (first login change, 6-month expiration)"
  - "Role-based access control (RBAC)"
  - "Admin impersonation with logging"
  - "Session management (12h max, 30min idle timeout)"
  - "Audit trail logging"
  - "QR payload encryption (Fernet/AES)"
  - "CORS configuration"

testing_priorities:
  critical:
    - "Authentication flow (login, captcha, password policy, session timeout)"
    - "Journal/QR validation (encryption, schedule check, GPS, grace period)"
    - "Schedule management and real-time validation"
    - "Student data management (EMIS fields)"
    - "Role-based access control enforcement"

  high:
    - "Bulk import/export (Excel)"
    - "Grade management and report card generation"
    - "Hierarchical time management (Year → Academic Year → Semester)"
    - "Admin features (audit logs, backup/restore, settings)"
    - "Data verification workflow"

  medium:
    - "Discipline/conduct tracking"
    - "Student mutations and graduation"
    - "Multi-role dashboard routing"
    - "Notification system"
    - "Public monitoring pages"

api_base_url: "http://localhost:8000/api"
frontend_base_url: "http://localhost:3000"

environment_requirements:
  backend:
    - "Python 3.10+"
    - "MongoDB (local or Atlas)"
    - "Environment variables: MONGO_URL, DB_NAME, SECRET_KEY, CORS_ORIGINS"

  frontend:
    - "Node.js 18+"
    - "Environment variables: REACT_APP_BACKEND_URL"

deployment_notes:
  - "Frontend: React app bundled with Craco, served via npm start (dev) or build (prod)"
  - "Backend: FastAPI with Uvicorn, async MongoDB via Motor"
  - "Docker support with containerization"
  - "GitHub Actions CI/CD workflow configured"

known_complexities:
  - "QR validation chain: decrypt → schedule check → GPS verify → grace period"
  - "EMIS data model: 150+ fields per student with complex nesting (parents, guardians, addresses)"
  - "Role switching: Users can have multiple roles and switch context"
  - "Hierarchical time: 3-level context (Calendar Year → Academic Year → Semester)"
  - "Journal locking: Time-based automatic status changes"
  - "Admin impersonation: Original admin preserved in JWT for reversion"

test_data_requirements:
  - "Demo users with various roles (admin, guru, siswa, wali_kelas)"
  - "Sample academic year, semesters, classes"
  - "Teaching schedules with various time slots"
  - "Rooms with GPS coordinates"
  - "Students with partial/complete EMIS data"
  - "Journals with different validation states"
  - "Grades for multiple students/subjects"

documentation_files:
  - "design_guidelines.md: Design standards"
  - "plan.md: Development roadmap"
  - "HIERARCHICAL_TIME_SYSTEM.md: Time hierarchy documentation"
  - "MIGRATION_STATUS.md: Migration tracking"
  - "GITHUB_INTEGRATION.md: GitHub workflow documentation"
