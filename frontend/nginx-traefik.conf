server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # TIDAK ada proxy_pass ke backend
    # Traefik akan handle routing /api ke backend service
    # Frontend akan fetch ke domain yang sama, Traefik route berdasarkan path

    # React Router - fallback ke index.html untuk semua route
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
