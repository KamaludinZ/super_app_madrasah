services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-change-this-password}
      MONGO_INITDB_DATABASE: ${DB_NAME:-super_app_madrasah}
    volumes:
      - mongodb_data:/data/db
    networks:
      - superapp-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin \"mongodb://localhost:27017/admin\" --eval \"db.runCommand({ ping: 1 }).ok\" | grep 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URL: ${MONGO_URL:-mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-change-this-password}@mongodb:27017/${DB_NAME:-super_app_madrasah}?authSource=admin}
      DB_NAME: ${DB_NAME:-super_app_madrasah}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-min-32-chars}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://app.example.com}
      SERVICE_URL_BACKEND: ${SERVICE_URL_BACKEND:-https://api.example.com}
      SERVICE_FQDN_BACKEND: ${SERVICE_FQDN_BACKEND:-api.example.com}
      SERVICE_URL_FRONTEND: ${SERVICE_URL_FRONTEND:-https://app.example.com}
      SERVICE_FQDN_FRONTEND: ${SERVICE_FQDN_FRONTEND:-app.example.com}
      ENV: ${ENV:-production}
      AUTO_UPDATE_ENABLED: ${AUTO_UPDATE_ENABLED:-false}
      AUTO_UPDATE_BRANCH: ${AUTO_UPDATE_BRANCH:-main}
      GITHUB_REPO: ${GITHUB_REPO:-KamaludinZ/super_app_madrasah}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    expose:
      - "8000"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - superapp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ""
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - superapp-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  mongodb_data:
  uploads:

networks:
  superapp-network:
    driver: bridge
